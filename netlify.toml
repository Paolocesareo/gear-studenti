[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "nft"
  included_files = ["netlify/functions/**"]

[functions."poll-gmail"]
  timeout = 26

# Mappa /api/* → Netlify Functions (compatibilità con il codice esistente)
[[redirects]]
  from = "/api/poll-gmail"
  to   = "/.netlify/functions/poll-gmail"
  status = 200

[[redirects]]
  from = "/api/invia-mail"
  to   = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/invia"
  to   = "/.netlify/functions/send-whatsapp"
  status = 200
